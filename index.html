<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Enersource Inc. — clean, affordable, reliable solar solutions across Liberia."
    />
    <title>Enersource Inc. | Solar Energy Solutions in Liberia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        try {
          const saved = localStorage.getItem('enersource-theme');
          const prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          const theme = saved ?? (prefersDark ? 'dark' : 'light');
          const isDark = theme === 'dark';
          document.documentElement.classList.toggle('dark', isDark);
          document.body && document.body.classList.toggle('dark', isDark);
        } catch {}
      })();
    </script>
  </head>
  <body class="bg-white font-sans text-slate-950 antialiased dark:bg-slate-950 dark:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
